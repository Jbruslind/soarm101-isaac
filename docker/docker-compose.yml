services:
  # ---------------------------------------------------------------------------
  # Isaac Sim: Physics simulation + rendering for SO-ARM101
  # Profiles: collect, eval-local, eval-remote, interactive
  # ---------------------------------------------------------------------------
  isaac-sim:
    profiles: ["collect", "eval-local", "eval-remote", "interactive"]
    build:
      context: ./isaac-sim
      dockerfile: Dockerfile
    image: soarm-isaac-sim
    container_name: soarm-isaac-sim
    entrypoint: bash
    tty: true
    stdin_open: true
    runtime: nvidia
    network_mode: host
    environment:
      - ACCEPT_EULA=${ACCEPT_EULA:-Y}
      - PRIVACY_CONSENT=${PRIVACY_CONSENT:-Y}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      - FASTRTPS_DEFAULT_PROFILES_FILE=/usr/local/share/middleware_profiles/rtps_udp_profile.xml
      - ISAAC_SIM_HEADLESS=${ISAAC_SIM_HEADLESS:-1}
    volumes:
      - ../robot_description:/robot_description:ro
      - ../isaac_envs:/isaac_envs:ro
      - ../data:/data:rw
      - ../.cursor:/.cursor:rw
      - vla_signals:/tmp/vla_signals
      - isaac-cache-kit:/isaac-sim/kit/cache
      - isaac-cache-ov:/root/.cache/ov
      - isaac-cache-pip:/root/.cache/pip
      - isaac-cache-glcache:/root/.cache/nvidia/GLCache
      - isaac-cache-compute:/root/.nv/ComputeCache
      - isaac-logs:/root/.nvidia-omniverse/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${NVIDIA_VISIBLE_DEVICES:-0}"]
              capabilities: [gpu]
    restart: "no"

  # ---------------------------------------------------------------------------
  # OpenPi Policy Server: VLA model inference via WebSocket
  # Only started locally when using eval-local, deploy-local, or interactive
  # ---------------------------------------------------------------------------
  openpi-server:
    profiles: ["eval-local", "deploy-local", "interactive"]
    build:
      context: ./openpi-server
      dockerfile: Dockerfile
    image: soarm-openpi
    container_name: soarm-openpi-server
    runtime: nvidia
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
      - OPENPI_PORT=${OPENPI_PORT:-8000}
      - OPENPI_POLICY_CONFIG=${OPENPI_POLICY_CONFIG:-soarm_pi0_fast}
      - OPENPI_CHECKPOINT_DIR=/models/soarm_lora
    volumes:
      - ../models:/models:ro
      - ../training/configs:/app/openpi/src/openpi/training/configs_custom:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${NVIDIA_VISIBLE_DEVICES:-0}"]
              capabilities: [gpu]
    restart: "no"

  # ---------------------------------------------------------------------------
  # ROS2 Bridge: Observation collection + action execution + OpenPi client
  # Connects to OpenPi server at OPENPI_HOST (local container or remote cloud)
  # ---------------------------------------------------------------------------
  ros2-bridge:
    profiles: ["collect", "eval-local", "eval-remote", "deploy-local", "deploy-remote", "interactive"]
    build:
      context: ./ros2-bridge
      dockerfile: Dockerfile
    image: soarm-ros2
    container_name: soarm-ros2-bridge
    network_mode: host
    environment:
      - OPENPI_HOST=${OPENPI_HOST:-localhost}
      - OPENPI_PORT=${OPENPI_PORT:-8000}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    volumes:
      - ../robot_description:/robot_description:ro
      - ../ros2_ws:/ros2_ws:rw
      - vla_signals:/tmp/vla_signals:ro
    command: ["ros2", "run", "soarm_vla_bridge", "vla_bridge"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # Training: LoRA/QLoRA fine-tuning of pi0/pi0-FAST
  # Runs exclusively (no other GPU containers) in Mode A
  # ---------------------------------------------------------------------------
  training:
    profiles: ["train"]
    build:
      context: ./training
      dockerfile: Dockerfile
    image: soarm-training
    container_name: soarm-training
    runtime: nvidia
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
      - TRAINING_BATCH_SIZE=${TRAINING_BATCH_SIZE:-1}
      - TRAINING_GRAD_ACCUM=${TRAINING_GRAD_ACCUM:-8}
      - TRAINING_LORA_RANK=${TRAINING_LORA_RANK:-32}
      - TRAINING_QUANTIZE_BASE=${TRAINING_QUANTIZE_BASE:-true}
    volumes:
      - ../data:/data:ro
      - ../models:/models:rw
      - ../training:/training:ro
    shm_size: "16g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${NVIDIA_VISIBLE_DEVICES:-0}"]
              capabilities: [gpu]
    restart: "no"

volumes:
  isaac-cache-kit:
  isaac-cache-ov:
  isaac-cache-pip:
  isaac-cache-glcache:
  isaac-cache-compute:
  isaac-logs:
  vla_signals:  # shared so bridge can read prompt/enabled when Isaac Sim has no ROS2
